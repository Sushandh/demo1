name: Deploy Static Website with Terraform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Sync website files to S3
        run: |
          WEBSITE_URL=$(terraform output -raw website_url)
          # Replace placeholder in HTML (optional)
          sed -i "s|http://my-static-website-bucket.s3-website-us-east-1.amazonaws.com|$WEBSITE_URL|g" ./app/index.html
          aws s3 sync ./app s3://my-static-website-bucket --acl public-read --delete