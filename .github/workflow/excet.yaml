name: Deploy Static Website to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.5

      # 3️⃣ Terraform Init & Apply
      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      # 4️⃣ Get website URL
      - name: Get website URL
        id: website
        run: echo "WEBSITE_URL=$(terraform output -raw website_url)" >> $GITHUB_ENV

      # 5️⃣ Replace placeholder in HTML
      - name: Replace WEBSITE_URL in HTML
        run: sed -i "s|{{WEBSITE_URL}}|$WEBSITE_URL|g" ./app/index.html

      # 6️⃣ Upload website files to S3
      - name: Upload site to S3
        run: aws s3 sync ./app s3://my-static-website-bucket --acl public-read --delete